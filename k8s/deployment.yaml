apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzz-bot
  namespace: buzz-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buzz-bot
  template:
    metadata:
      labels:
        app: buzz-bot
    spec:
      containers:
        - name: buzz-bot
          image: ghcr.io/watchcat/buzz-bot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: GC_RETRY_SIGNALS_ALWAYS
              value: "1"
          envFrom:
            - secretRef:
                name: buzz-bot-env
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              # Bumped 512Mi→1Gi: concurrent img-proxy/audio-proxy stream-through
              # buffers (slow upstreams) + #90 backfill payloads OOMKilled the
              # 512Mi pod (exit 137, CrashLoop). Stopgap; real fix = bound/redirect
              # proxy streaming (tracked follow-up, post-#90-drain).
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
