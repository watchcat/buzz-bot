apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzz-bot
  namespace: buzz-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: buzz-bot
  template:
    metadata:
      labels:
        app: buzz-bot
    spec:
      containers:
        - name: buzz-bot
          image: ghcr.io/watchcat/buzz-bot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: GC_RETRY_SIGNALS_ALWAYS
              value: "1"
          envFrom:
            - secretRef:
                name: buzz-bot-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
