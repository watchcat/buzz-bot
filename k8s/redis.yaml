# Redis for the whisper job queue.
# Single-node, no persistence — jobs are ephemeral (retried if worker restarts).
# The Mac Mini worker connects to this via NodePort.
---
apiVersion: v1
kind: Namespace
metadata:
  name: whisper

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: whisper
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

---
# ClusterIP — buzz-bot reaches Redis inside the cluster
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: whisper
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# NodePort — Mac Mini worker reaches Redis from outside the cluster.
# The worker uses: redis://:PASSWORD@<NODE_IP>:30379
apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: whisper
spec:
  type: NodePort
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      nodePort: 30379   # ← fixed port, open this in Hetzner firewall

---
# Create the password secret:
#   kubectl create secret generic redis-secret \
#     --namespace whisper \
#     --from-literal=password=<strong-password>
