apiVersion: v1
kind: Service
metadata:
  name: telegram-bot-api
  namespace: buzz-bot
spec:
  selector:
    app: telegram-bot-api
  ports:
    - port: 8081
      targetPort: 8081
  # ClusterIP only — the local bot API server does not need to be
  # publicly reachable; buzz-bot reaches it via internal DNS and
  # Telegram receives updates via the server's outbound connection.
