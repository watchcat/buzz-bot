apiVersion: v1
kind: Secret
metadata:
  name: tg-api-credentials
  namespace: buzz-bot
type: Opaque
stringData:
  # Obtain these at https://my.telegram.org → API development tools
  # These are app credentials, NOT the bot token.
  TELEGRAM_API_ID: "12345678"
  TELEGRAM_API_HASH: "your-api-hash-here"
