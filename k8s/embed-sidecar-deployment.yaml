apiVersion: apps/v1
kind: Deployment
metadata:
  name: embed-sidecar
  namespace: buzz-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embed-sidecar
  template:
    metadata:
      labels:
        app: embed-sidecar
    spec:
      containers:
      - name: sidecar
        image: watchcat/embed-sidecar:1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
          limits:
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: embed-sidecar
  namespace: buzz-bot
spec:
  selector:
    app: embed-sidecar
  ports:
  - port: 8000
    targetPort: 8000
