apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot-api
  namespace: buzz-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot-api
  template:
    metadata:
      labels:
        app: telegram-bot-api
    spec:
      containers:
        - name: telegram-bot-api
          image: aiogram/telegram-bot-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - secretRef:
                name: tg-api-credentials
          env:
            - name: TELEGRAM_LOCAL
              value: "true"         # enables HTTP webhooks + up to 2 GB file transfers
            - name: TELEGRAM_HTTP_PORT
              value: "8081"
          volumeMounts:
            - name: data
              mountPath: /var/lib/telegram-bot-api
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tg-api-data
