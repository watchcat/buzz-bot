apiVersion: v1
kind: Secret
metadata:
  name: buzz-bot-env
  namespace: buzz-bot
type: Opaque
stringData:
  BOT_TOKEN: "your-telegram-bot-token"
  # With local bot API server: use internal cluster URL (HTTP is fine in --local mode)
  WEBHOOK_URL: "http://buzz-bot:3000/webhook"
  DATABASE_URL: "postgresql://user:pass@host/db?sslmode=require"
  PORT: "3000"
  BASE_URL: "https://app.buzz-bot.top"
  # Local bot API server endpoint — remove this line to fall back to api.telegram.org
  TELEGRAM_API_SERVER: "http://telegram-bot-api:8081/"
  # Redis URL for the whisper job queue (worker on Mac Mini)
  # Format: redis://:PASSWORD@NODE_IP:30379
  WHISPER_REDIS_URL: "redis://default:your-redis-password@192.168.1.50:30379"
  # URL the worker will POST transcription results to (must be reachable from Mac Mini)
  WHISPER_CALLBACK_BASE: "https://app.buzz-bot.top"
  # RunPod Serverless — get from app.runpod.io
  RUNPOD_API_KEY: "your-runpod-api-key"
  RUNPOD_ENDPOINT_ID: "your-endpoint-id"
