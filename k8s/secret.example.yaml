apiVersion: v1
kind: Secret
metadata:
  name: buzz-bot-env
  namespace: buzz-bot
type: Opaque
stringData:
  BOT_TOKEN: "your-telegram-bot-token"
  # With local bot API server: use internal cluster URL (HTTP is fine in --local mode)
  WEBHOOK_URL: "http://buzz-bot:3000/webhook"
  DATABASE_URL: "postgresql://user:pass@host/db?sslmode=require"
  PORT: "3000"
  BASE_URL: "https://app.buzz-bot.top"
  # Local bot API server endpoint — remove this line to fall back to api.telegram.org
  TELEGRAM_API_SERVER: "http://telegram-bot-api:8081/"

  # ── RunPod Serverless (dub pipeline) ───────────────────────────────────────
  # Get from app.runpod.ai → Serverless → your endpoint
  RUNPOD_API_KEY: "your-runpod-api-key"
  RUNPOD_ENDPOINT_ID: "your-endpoint-id"
  # URL buzz-bot is reachable at from RunPod (used for dub_result callback)
  DUB_CALLBACK_BASE: "https://app.buzz-bot.top"

  # ── Cloudflare R2 (dubbed audio storage) ──────────────────────────────────
  # R2_ENDPOINT: account-level, no bucket name in the URL
  R2_ENDPOINT: "https://<account-id>.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: "your-r2-access-key-id"
  R2_SECRET_ACCESS_KEY: "your-r2-secret-access-key"
  R2_BUCKET: "buzz-bot-dubbed"
  # Public URL for the bucket — enable "Allow Access" in Cloudflare R2 dashboard
  R2_PUBLIC_URL: "https://pub-<hash>.r2.dev"
