apiVersion: v1
kind: Secret
metadata:
  name: buzz-bot-env
  namespace: buzz-bot
type: Opaque
stringData:
  BOT_TOKEN: "your-telegram-bot-token"
  WEBHOOK_URL: "https://app.buzz-bot.top/webhook"
  DATABASE_URL: "postgresql://user:pass@host/db?sslmode=require"
  PORT: "3000"
  BASE_URL: "https://app.buzz-bot.top"
